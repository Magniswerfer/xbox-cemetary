<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 130 130" width="100" height="100">
  <defs>
    <radialGradient id="xorb" cx="36%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#e6ffb0" />
      <stop offset="38%" stop-color="#8fd13a" />
      <stop offset="100%" stop-color="#1c4f0c" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" />
    </filter>
    <pattern id="scan" width="6" height="4" patternUnits="userSpaceOnUse">
      <rect width="6" height="1.6" fill="#000" fill-opacity="0.28" />
    </pattern>
    <clipPath id="orbClip">
      <circle cx="50" cy="50" r="45" />
    </clipPath>
  </defs>

  <!-- soft lime glow halo -->
  <circle cx="50" cy="50" r="44" fill="#9be24f" filter="url(#glow)" opacity="0.9" />

  <!-- orb -->
  <circle cx="50" cy="50" r="45" fill="url(#xorb)" stroke="rgba(225,255,170,.45)" stroke-width="1.5" />
  <path d="M50 21 V79" fill="none" stroke="#f2ffd0" stroke-width="9" stroke-linecap="round" />
  <path d="M32 41 H68" fill="none" stroke="#f2ffd0" stroke-width="9" stroke-linecap="round" />
  <ellipse cx="38" cy="32" rx="15" ry="9" fill="rgba(255,255,255,.35)" />

  <!-- CRT scanlines, clipped to the orb -->
  <rect x="-15" y="-15" width="130" height="130" fill="url(#scan)" clip-path="url(#orbClip)" />
</svg>
